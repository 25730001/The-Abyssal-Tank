<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제1구역: 심연의 수조</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-deep:#0a0a12;
    --panel-glass:rgba(13,13,23,0.85);
    --sub-purple:#a277ff;
    --neon-blue:#00f0ff;
    --neon-pink:#ff007f;
    --text-silver:#f5f5f7;
    --text-dark:#6e6e73;
}

/* ===== 기본 ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background: radial-gradient(circle at 50% 30%, #16122c, #06060c);
    color:var(--text-silver);
    font-family:'Noto Sans KR',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:80px 20px 40px;
    overflow-x:hidden;
}

/* ===== BOOT SCREEN (시작 버튼 추가 및 스타일 수정) ===== */
#boot-overlay{
    position:fixed;inset:0;
    background:radial-gradient(circle at 75% 75%, #1a0f2e, #000);
    z-index:999;
    transition: opacity 1s ease, visibility 1s ease; /* JS 제어를 위해 애니메이션 대신 transition 사용 */
}

/* 부트 스크린이 닫힐 때 클래스 */
#boot-overlay.is-hidden {
    opacity: 0;
    visibility: hidden;
}

.boot-meta-box {
    position: absolute;
    bottom: 50px;
    right: 50px;
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
}

#boot-id{
    font-family:Orbitron;
    font-size:1.2rem;
    color:#a277ff;
    text-shadow:0 0 15px rgba(162,119,255,0.6);
    letter-spacing: 1px;
}

#boot-name{
    font-size:1rem;
    color:#00f0ff;
    font-weight: 400;
    letter-spacing: 1px;
}

/* 시작 버튼 디자인 (삐까뻔쩍한 네온 스타일) */
.start-system-btn {
    margin-top: 15px;
    padding: 12px 28px;
    border-radius: 8px;
    border: 2px solid var(--neon-blue);
    background: rgba(0, 240, 255, 0.05);
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    font-weight: 800;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(0, 240, 255, 0.2), inset 0 0 10px rgba(0, 240, 255, 0.1);
    text-align: center;
}

.start-system-btn:hover {
    background: var(--neon-blue);
    color: #000;
    box-shadow: 0 0 30px var(--neon-blue), 0 0 10px rgba(255,255,255,0.5);
    transform: scale(1.05);
    text-shadow: none;
}

/* ===== STATUS BAR ===== */
#status-bar{
    position:fixed;
    top:0;left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:650px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    padding:15px 20px;
    background:rgba(10,10,18,0.9);
    backdrop-filter:blur(15px);
    border-bottom:2px solid rgba(0, 240, 255, 0.3);
    border-radius:0 0 16px 16px;
    z-index:100;
    box-shadow: 0 5px 20px rgba(0, 240, 255, 0.1);
}

.stat-item{text-align:center;}
.stat-label{
    font-size:0.65rem;
    color:var(--text-dark);
    font-family:Orbitron;
    letter-spacing: 1px;
}
.stat-value{
    font-family:Orbitron;
    color:var(--neon-blue);
    font-weight:800;
    text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
}

/* ===== GAME CONTAINER ===== */
#game-container{
    width:100%;
    max-width:650px;
    background:var(--panel-glass);
    backdrop-filter:blur(25px);
    padding:30px;
    border-radius:24px;
    border: 1px solid rgba(162, 119, 255, 0.2);
    position: relative;
    box-shadow: 0 25px 60px rgba(0,0,0,0.8), 
                inset 0 0 30px rgba(162, 119, 255, 0.05);
}

#game-container::before {
    content: '';
    position: absolute;
    top: 15px; left: 15px; width: 20px; height: 20px;
    border-top: 2px solid var(--neon-blue);
    border-left: 2px solid var(--neon-blue);
}
#game-container::after {
    content: '';
    position: absolute;
    bottom: 15px; right: 15px; width: 20px; height: 20px;
    border-bottom: 2px solid var(--sub-purple);
    border-right: 2px solid var(--sub-purple);
}

/* VIDEO CONTAINER */
#title-image-container{
    height:380px;
    background:#000;
    border-radius:16px;
    overflow:hidden;
    margin-bottom:20px;
    position:relative;
    border: 1px solid rgba(0, 240, 255, 0.3);
    box-shadow: 0 0 25px rgba(0, 240, 255, 0.15);
}

#game-video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.img-placeholder{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#555;
    font-family:Orbitron;
    font-size:0.9rem;
    letter-spacing: 3px;
}

/* TEXT AREA */
.text-section {
    border-left: 3px solid var(--neon-blue);
    padding-left: 15px;
    margin-bottom: 25px;
}

#scene-title{
    font-family:Orbitron;
    font-size:1.3rem;
    margin-bottom:6px;
    background:linear-gradient(45deg,#fff, var(--neon-blue), #a277ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    font-weight: 800;
    letter-spacing: 1px;
}

.ui-divider {
    height: 1px;
    background: linear-gradient(90deg, rgba(0,240,255,0.4), transparent);
    margin-bottom: 10px;
}

#description{
    font-size:0.95rem;
    line-height:1.6;
    color:#d1d1d6;
}

/* BUTTONS */
#choices{display:flex;flex-direction:column;gap:12px;}

button{
    padding:18px 24px;
    border-radius:14px;
    border: 1px solid rgba(0, 240, 255, 0.4);
    background: linear-gradient(135deg, rgba(30, 16, 60, 0.7), rgba(11, 44, 70, 0.7));
    color:#ffffff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor:pointer;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    text-align:left;
    position:relative;
    overflow:hidden;
    letter-spacing: 0.5px;
    box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.1), 0 4px 10px rgba(0, 0, 0, 0.3);
}

button:hover{
    transform: translateY(-2px);
    color: #ffffff;
    border-color: #ffffff;
    background: linear-gradient(135deg, rgba(162, 119, 255, 0.3), rgba(0, 240, 255, 0.25));
    box-shadow: 0 0 25px rgba(0, 240, 255, 0.6), 
                0 0 10px rgba(162, 119, 255, 0.4),
                inset 0 0 15px rgba(255, 255, 255, 0.2);
    text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
}

button::after{
    content:"";
    position:absolute;
    top:-50%;
    left:-60%;
    width:220%;
    height:220%;
    background:linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.4), rgba(0, 240, 255, 0.6), transparent);
    transform:rotate(30deg);
    opacity:0;
}

button:hover::after{
    animation:scan 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    opacity:1;
}

@keyframes scan{
    from{transform:translateX(-40%) rotate(30deg);}
    to{transform:translateX(40%) rotate(30deg);}
}
</style>
</head>

<body>

<div id="boot-overlay">
    <div class="boot-meta-box">
        <div id="boot-id">25730001</div>
        <div id="boot-name">이인아</div>
        <button class="start-system-btn" onclick="startSystem()">SYSTEM START</button>
    </div>
</div>

<div id="status-bar">
    <div class="stat-item"><div class="stat-label">KARMA</div><div id="karma" class="stat-value">0</div></div>
    <div class="stat-item"><div class="stat-label">GREED</div><div id="greed" class="stat-value">0</div></div>
    <div class="stat-item"><div class="stat-label">ASSET</div><div id="asset" class="stat-value">0</div></div>
    <div class="stat-item"><div class="stat-label">NOISE</div><div id="noise" class="stat-value">0</div></div>
</div>

<div id="game-container">

    <div id="title-image-container">
        <video id="game-video" autoplay loop muted playsinline></video>
        <div class="img-placeholder" id="placeholder">DATA_VISUALIZING...</div>
    </div>

    <div class="text-section">
        <div id="scene-title">INIT</div>
        <div class="ui-divider"></div>
        <div id="description">...</div>
    </div>
    
    <div id="choices"></div>

</div>

<script>
let state={karma:0,greed:0,asset:0,noise:0,isError:false};

const scenes={
start:{
title:"[표지] 제1구역 : 심연의 수조",
desc:"카메라가 수조를 향해 접근합니다.",
video:"media/open.mp4",
choices:[
{text:"정화 프로토콜",effect:{karma:10},next:"s1"},
{text:"강제 우회",effect:{greed:10},next:"s1"}
]
},
s1:{
title:"PHASE 01",
desc:"지하 구역 탐색",
video:"media/s1.mp4",
choices:[
{text:"분석",effect:{asset:50},next:"s2"},
{text:"폭주",effect:{greed:30,noise:20},next:"s2"}
]
},
s2:{
title:"PHASE 02",
desc:"복제 폭발",
video:"media/s2.mp4",
choices:[
{text:"회유",effect:{asset:-100},next:"s3"},
{text:"저항",effect:{karma:20},next:"s3"}
]
},
s3:{
title:"PHASE 03",
desc:"충돌",
video:"media/s3.mp4",
choices:[
{text:"강제 수거",effect:{greed:50},next:"s4"},
{text:"종료",effect:{karma:40},next:"s4"}
]
},
s4:{
title:"PHASE 04",
desc:"붕괴",
video:"media/s4.mp4",
choices:[
{text:"최종 진입",next:"s5"}
]
},
s5:{
title:"FINAL",
desc:"심판",
video:"media/s5.mp4",
choices:[
{text:"결과",next:"final"}
]
}
};

function updateUI(){
document.getElementById("karma").innerText=state.karma;
document.getElementById("greed").innerText=state.greed;
document.getElementById("asset").innerText=state.asset;
document.getElementById("noise").innerText=state.noise;
}

function renderScene(id){
if(id==="final") return calculateEnding();

const scene=scenes[id];

document.getElementById("scene-title").innerText=scene.title;
document.getElementById("description").innerText=scene.desc;

const video=document.getElementById("game-video");
const placeholder=document.getElementById("placeholder");

video.src=scene.video;
video.style.display="block";
placeholder.style.display="none";

video.play().catch(()=>{});

const box=document.getElementById("choices");
box.innerHTML="";

scene.choices.forEach(c=>{
const b=document.createElement("button");
b.innerText=c.text;
b.onclick=()=>{
if(c.effect){
for(let k in c.effect) state[k]+=c.effect[k];
}
updateUI();
renderScene(c.next);
};
box.appendChild(b);
});
}

function calculateEnding(){
document.getElementById("scene-title").innerText="ENDING";
document.getElementById("description").innerText="시스템 종료";
document.getElementById("choices").innerHTML=
'<button onclick="location.reload()">RESTART</button>';
}

/* 수정된 부분: 버튼을 누르면 이 함수가 실행되어 부트막을 치우고 첫 게임 화면을 랜더링합니다 */
function startSystem() {
    const overlay = document.getElementById("boot-overlay");
    overlay.classList.add("is-hidden"); // 부트 스크린 페이드아웃 숨김 처리
    renderScene("start"); // 첫 표지 씬 불러오기
}

// 초기 UI 숫자 세팅만 실행 (자동 시작 타이머 제거)
updateUI();
</script>

</body>
</html>
